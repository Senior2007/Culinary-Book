<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рецепт — Culinary Book</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a href="/index.html" class="site-logo">Culinary Book</a>
            <nav class="site-nav" id="site-nav"></nav>
            <span id="user-rating-badge" class="user-badge hidden"></span>
        </div>
    </header>

    <main>
        <section id="recipe-details" class="card recipe-detail">
            <p class="text-muted">Загрузка…</p>
        </section>

        <div id="add-to-book-section" class="card hidden">
            <button type="button" class="btn btn-primary" id="add-to-book-button">Добавить в мою книгу</button>
        </div>

        <section class="card comments-section" id="comments-section">
            <h2 class="section-title">Комментарии</h2>
            <div id="comments-list"></div>

            <div id="comment-form-section" class="hidden mt-1">
                <h3>Оставить комментарий</h3>
                <p class="form-hint">Нельзя комментировать свой рецепт. Добавьте текст и ссылку на фото (URL).</p>
                <form id="comment-form">
                    <div class="form-group">
                        <label for="comment-text">Текст</label>
                        <textarea id="comment-text" rows="3" required placeholder="Ваш отзыв о рецепте…"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="comment-image">Ссылка на фото (необязательно)</label>
                        <input type="url" id="comment-image" placeholder="https://…">
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>
            <p id="comment-login-hint" class="text-muted hidden">
                <a href="/login.html">Войдите</a>, чтобы оставить комментарий.
            </p>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="recipe.js"></script>
</body>
</html>
