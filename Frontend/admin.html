<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Culinary Book</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a href="/index.html" class="site-logo">Culinary Book</a>
            <nav class="site-nav" id="site-nav"></nav>
            <span id="user-rating-badge" class="user-badge hidden"></span>
        </div>
    </header>

    <main>
        <h1 class="section-title">Админ-панель</h1>
        <p id="admin-alert" class="alert alert-error hidden"></p>

        <section class="card">
            <h2 class="section-title">Пользователи</h2>
            <ul id="admin-users-list" class="recipe-list"></ul>
        </section>

        <section class="card">
            <h2 class="section-title">Рецепты</h2>
            <ul id="admin-recipes-list" class="recipe-list"></ul>
        </section>

        <section class="card">
            <h2 class="section-title">Комментарии</h2>
            <div id="admin-comments-list"></div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="admin.js"></script>
</body>
</html>
